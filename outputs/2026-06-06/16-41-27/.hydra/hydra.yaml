hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - debug_one_batch=true
    - batch_size=2
    - image_size=64
    - mask_size=8
    - token_grid_size=8
    - token_count=64
    - feature_dim=64
    - num_workers=0
    - dataloader.num_workers=0
    - dataloader.pin_memory=false
    - dataloader.persistent_workers=false
    - dataloader.drop_last=false
    - model.input_size=8
    - model.in_channels=64
    - model.depth=1
    - model.hidden_size=64
    - model.num_heads=4
    - model.mlp_ratio=2.0
    - light_encoder.hidden_dim=64
    - light_transfer_transformer.hidden_size=64
    - light_transfer_transformer.depth=1
    - light_transfer_transformer.patch_size=8
    - assets.vidit.enabled=false
    - assets.sit_pretrained.enabled=false
    - result_name=CPLightDiTDDPSmoke
    - result_dir=checkpoint/001_CPLightDiTDDPSmoke
  job:
    name: train
    chdir: null
    override_dirname: assets.sit_pretrained.enabled=false,assets.vidit.enabled=false,batch_size=2,dataloader.drop_last=false,dataloader.num_workers=0,dataloader.persistent_workers=false,dataloader.pin_memory=false,debug_one_batch=true,feature_dim=64,image_size=64,light_encoder.hidden_dim=64,light_transfer_transformer.depth=1,light_transfer_transformer.hidden_size=64,light_transfer_transformer.patch_size=8,mask_size=8,model.depth=1,model.hidden_size=64,model.in_channels=64,model.input_size=8,model.mlp_ratio=2.0,model.num_heads=4,num_workers=0,result_dir=checkpoint/001_CPLightDiTDDPSmoke,result_name=CPLightDiTDDPSmoke,token_count=64,token_grid_size=8
    id: ???
    num: ???
    config_name: TrainCPLightDiT
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/jovyan/CV
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/jovyan/CV/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/jovyan/CV/outputs/2026-06-06/16-41-27
    choices:
      wandb: local
      diffusion: TrajectoryFlow
      optimizer: AdamW
      trainer: CPLightDiTTrainer
      loss: CPLightDiTLosses
      model: CP_LightDiT_XL
      dataloader: base
      dataset: vidit
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
