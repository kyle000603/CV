dataset:
  image_key: image
  source_image_key: source_image
  target_image_key: target_image
  source_light_key: source_light
  target_light_key: target_light
  light_cond_key: light_cond
  source_ray_key: source_ray
  target_ray_key: target_ray
  delta_angle_key: delta_angle
  mask_key: mask
  y_key: 'y'
  depth_key: depth
  depth_valid_key: depth_valid
  train:
    _target_: dataset.data.vidit.VIDITRelightingDataset
    root: /tmp/cplightdit_ray_smoke_data
    split: train
    image_size: ${image_size}
    mask_size: ${mask_size}
    fixed_color_temperature: true
    use_depth: true
    extended_light: false
    track1_source_direction: 'N'
    track1_target_direction: E
    track1_temperature: 5500
  val:
    _target_: dataset.data.vidit.VIDITRelightingDataset
    root: /tmp/cplightdit_ray_smoke_data
    split: val
    image_size: ${image_size}
    mask_size: ${mask_size}
    fixed_color_temperature: true
    use_depth: true
    extended_light: false
    track1_source_direction: 'N'
    track1_target_direction: E
    track1_temperature: 5500
  test:
    _target_: dataset.data.vidit.VIDITRelightingDataset
    root: data/VIDIT_HF
    split: val
    image_size: ${image_size}
    mask_size: ${mask_size}
    fixed_color_temperature: true
    use_depth: true
    extended_light: false
    track1_source_direction: 'N'
    track1_target_direction: E
    track1_temperature: 5500
dataloader:
  _target_: dataset.dataloader.base.DataModule
  global_seed: ${global_seed}
  global_batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: 2
  drop_last: false
model:
  _target_: models.diffusion.CP_LightDiT.CPLightDiT
  input_size: 16
  num_classes: 1
  patch_size: 1
  depth: 28
  hidden_size: 1152
  num_heads: 16
  mlp_ratio: 4.0
  use_swiglu: false
  in_channels: ${feature_dim}
  learn_sigma: false
  qk_norm: true
  class_dropout_prob: 0.0
  light_dim: 9
  dense_cond_channels: 18
  use_dense_condition: true
  use_source_tokens: true
  light_drop_prob: 0.05
  dense_drop_prob: 0.05
  source_drop_prob: 0.0
loss:
  mse:
    _target_: losses.mse.MSELoss
trainer:
  _target_: trainers.trainCPLightDiT.CPLightDiTTrainer
  _partial_: true
  _recursive_: false
  validation_start_epoch: 50
  sample_seed: null
  visual_seed: null
optimizer:
  parameters:
    clip_grad_norm: ${grad_clip_norm}
  adamw:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: ${lr}
    weight_decay: ${weight_decay}
    betas:
    - 0.9
    - 0.999
diffusion:
  train:
    timestep_shift: 0.2
  inference:
    timestep_shift: 0.15
    mode: euler
    sample_steps: 25
    cfg: 1.0
    cfg_mode: constant
wandb:
  project: ${project}
  entity: null
  name: ${note}
  mode: disabled
project: CPLightDiT
note: vidit_shadow_consistent_light_transfer
stage: cplightdit_finetune
loss_mode: minimal
image_size: 256
mask_size: 16
num_workers: 0
batch_size: 2
global_seed: 0
epochs: 1
result_root: /tmp/cplightdit_finetune_rayload_smoke
result_name: CPLightDiT
result_index_width: 3
use_numbered_result_dir: true
result_dir: checkpoint/001_CPLightDiT
log_to_file: true
log_rank_zero_only: true
silent_nonzero_rank_wait: true
log_every: 100
save_every: 1
keep_last_checkpoints: 5
checkpoint: null
ray_encoder_checkpoint: /tmp/cplightdit_ray_smoke_tiny/001_RayEncoder/ray_encoder_latest.pth
feature_dim: 392
token_grid_size: 16
token_count: 256
use_gt_source_light_prob: 0.5
freeze_backbone: true
freeze_ray_encoder: true
freeze_light_encoder: true
freeze_tokenizer: true
train_condition_adapters_only: true
train_light_transfer_transformer: true
allow_freeze_without_pretrain: true
detach_dense_cond_from_flow: false
enable_image_space_losses: false
decode_loss_every: 0
debug_one_batch: true
q_clip: 2.0
transfer_smooth_l1_beta: 0.1
lr: 0.0001
backbone_lr: 0.0
adapter_lr: 0.0001
light_transfer_lr: 0.0001
weight_decay: 0.01
grad_clip_norm: 1.0
lambda_flow: 1.0
lambda_transfer: 0.1
light_encoder:
  _target_: models.modules.ray_encoder.RayEncoder
  light_dim: 3
  hidden_dim: 256
  extended: false
physics_light_transfer:
  _target_: models.modules.physics_light_transfer.PhysicsLightTransfer
  tau_remove: 0.15
  tau_create: 0.15
  prior_temperature: 0.05
  use_visibility: false
light_transfer_transformer:
  _target_: models.modules.light_transfer_transformer.LightTransferTransformer
  in_image_channels: 3
  light_dim: 3
  physics_map_channels: 18
  output_dense_channels: 18
  hidden_size: 256
  depth: 4
  num_heads: 4
  patch_size: 8
  dropout: 0.0
assets:
  hf_vidit:
    enabled: false
    dataset_name: Nahrawy/VIDIT-Depth-ControlNet
    split: train
    root: data/VIDIT_HF
    cache_dir: data/hf_cache
    val_fraction: 0.1
    seed: ${global_seed}
    min_images: 100
    max_items: null
    force: false
    disable_xet: true
  vidit:
    enabled: false
    root: data/VIDIT
    min_images: 100
    archives:
    - url: https://datasets.epfl.ch/vidit/NTIRE2021/track1_train.zip
      path: data/VIDIT/track1_train.zip
      extract_to: data/VIDIT
    - url: https://datasets.epfl.ch/vidit/NTIRE2021/track1_validation.zip
      path: data/VIDIT/track1_validation.zip
      extract_to: data/VIDIT
    - url: https://datasets.epfl.ch/vidit/NTIRE2021/track1_validation_gt.zip
      path: data/VIDIT/track1_validation_gt.zip
      extract_to: data/VIDIT
    - url: https://datasets.epfl.ch/vidit/NTIRE2021/track1_test.zip
      path: data/VIDIT/track1_test.zip
      extract_to: data/VIDIT
  sit_pretrained:
    enabled: false
    load: true
    require_match: false
    optional: false
    hf_repo_id: nyu-visionx/SiT-collections
    hf_filename: SiT-XL-2-256.pt
    hf_repo_type: model
    url: https://www.dl.dropboxusercontent.com/scl/fi/as9oeomcbub47de5g4be0/SiT-XL-2-256.pt?rlkey=uxzxmpicu46coq3msb17b9ofa&dl=0
    path: pretrained/SiT-XL-2-256x256.pt
    sha256: null
